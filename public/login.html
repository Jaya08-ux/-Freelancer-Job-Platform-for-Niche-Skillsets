<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | SkillNiche</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: "class" };</script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <header id="navbar"></header>
    <main class="page-shell mx-auto flex min-h-[80vh] items-center justify-center py-10">
      <section class="form-card w-full max-w-lg rounded-[32px] p-8">
        <p class="mb-3 text-sm font-semibold uppercase tracking-[0.18em] text-emerald-700">Welcome back</p>
        <h1 class="display-font text-4xl font-bold">Sign in to SkillNiche</h1>
        <form id="loginForm" class="mt-8 space-y-4">
          <input name="email" type="email" required class="w-full rounded-2xl border border-black/10 bg-white/70 px-4 py-3 outline-none dark:border-white/10 dark:bg-slate-900/50" placeholder="Email address" />
          <input name="password" type="password" required class="w-full rounded-2xl border border-black/10 bg-white/70 px-4 py-3 outline-none dark:border-white/10 dark:bg-slate-900/50" placeholder="Password" />
          <button class="w-full rounded-2xl bg-slate-900 px-4 py-3 font-semibold text-white">Login</button>
        </form>
        <p class="mt-5 text-sm text-slate-500">New here? <a href="/register.html" class="font-semibold text-emerald-700">Create an account</a></p>
      </section>
    </main>
    <div id="toast" class="hidden"></div>
    <script src="/js/api.js"></script>
    <script src="/js/app.js"></script>
    <script src="/js/auth.js"></script>
  </body>
</html>
